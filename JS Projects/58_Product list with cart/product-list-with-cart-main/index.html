<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./assets/images/favicon-32x32.png" />

		<link rel="stylesheet" href="./style.css" />

		<title>Product list with cart</title>
	</head>
	<body>
		<h1>Desserts</h1>
		<div class="container">
			<div class="desserts-container"></div>

			<div class="cart-container">
				<div class="cart-title">Your cart (0)</div>
			</div>
		</div>

		<div class="quantity-controls">
			<div class="icon-container decrement">
				<img src="./assets/images/icon-decrement-quantity.svg" alt="minus" />
			</div>
			<span class="qty-count"></span>
			<div class="icon-container increment">
				<img src="./assets/images/icon-increment-quantity.svg" alt="plus" />
			</div>
		</div>
		<script src="./app.js"></script>
		<!-- <script src="./test.js"></script> -->
	</body>
</html>
