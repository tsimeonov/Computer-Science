<!DOCTYPE html>
<html lang="en">
	<head>

	<body>
		<!--=============== HEADER ===============-->
		<header class="header">
			<!--======== Topbar  ========-->
			<div class="topbar">
				<div class="topbar-container container">
					<ul class="topbar-list">
						<li class="topbar-item">
							<a href="returns.html" class="topbar-link">Returns Policy</a>
						</li>
						<li class="topbar-item">
							<a href="#newsletter" class="topbar-link">Newsletter</a>
						</li>
						<li class="topbar-item">
							<a href="contact.html" class="topbar-link">Contact</a>
						</li>
					</ul>

					<div class="topbar-socials">
						<a href="#" class="topbar-social-link">
							<i class="ri-facebook-circle-fill"></i>
						</a>
						<a href="#" class="topbar-social-link">
							<i class="ri-twitter-fill"></i>
						</a>
						<a href="#" class="topbar-social-link">
							<i class="ri-instagram-fill"></i>
						</a>
						<a href="#" class="topbar-social-link">
							<i class="ri-youtube-fill"></i>
						</a>
					</div>

					<div class="topbar-shipping">
						<img src="assets/img/truck.svg" alt="truck" class="topbar-icon" />
						<p class="topbartext">Free shipping for all orders of $150</p>
					</div>
				</div>
			</div>

			<!--======== Bottom bar  ========-->
			<div class="bottom-bar container">
				<a href="index.html">
					<img src="assets/img/logo.png" alt="logo" class="navbar-logo" />
				</a>

				<form action="" class="navbar-form">
					<select name="" id="navbarselect" class="navbar-select">
						<option value="all">All Categories</option>
						<option value="fas">Fashion</option>
						<option value="ele">Electronics</option>
						<option value="jew">Jewelry</option>
						<option value="gro">Grocery</option>
					</select>

					<input type="text" placeholder="Search..." class="navbar-input" />

					<button type="submit" class="navbar-search">
						<i class="ti-search-line"></i>
					</button>
				</form>

				<div class="navbar-btns">
					<a href="account.html" class="navbar-btn">
						<i class="ri-user-line"></i>
					</a>
					<a href="#" class="navbar-btn">
						<i class="ri-heart-line"></i>
					</a>
					<a href="#" class="navbar-btn">
						<i class="ri-shopping-cart-line"></i>
					</a>
				</div>
			</div>
		</header>
