<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Glassmorphism Weather Pro</title>
		<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
			rel="stylesheet" />

		<style>
			:root {
				--bg-gradient: linear-gradient(
					135deg,
					#0f2027 0%,
					#203a43 50%,
					#2c5364 100%
				);
				--glass-bg: rgba(255, 255, 255, 0.1);
				--glass-border: rgba(255, 255, 255, 0.15);
				--text-color: #ffffff;
				--accent: #4facfe;
			}

			.light-theme {
				--bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
				--glass-bg: rgba(255, 255, 255, 0.5);
				--glass-border: rgba(255, 255, 255, 0.3);
				--text-color: #2c3e50;
				--accent: #2980b9;
			}

			body {
				margin: 0;
				font-family: 'Inter', sans-serif;
				background: var(--bg-gradient);
				color: var(--text-color);
				min-height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				transition: background 0.5s ease;
			}

			.dashboard {
				display: grid;
				grid-template-columns: 1.5fr 1fr;
				gap: 25px;
				width: 90%;
				max-width: 1100px;
				background: var(--glass-bg);
				backdrop-filter: blur(15px);
				border: 1px solid var(--glass-border);
				border-radius: 24px;
				padding: 40px;
				box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
			}

			header {
				grid-column: 1 / -1;
				display: flex;
				gap: 15px;
				align-items: center;
				flex-wrap: wrap;
			}

			input {
				flex: 1;
				padding: 12px 20px;
				border-radius: 12px;
				border: 1px solid var(--glass-border);
				background: rgba(255, 255, 255, 0.1);
				color: var(--text-color);
				outline: none;
			}

			button {
				padding: 12px 24px;
				border-radius: 12px;
				border: none;
				background: var(--accent);
				color: white;
				cursor: pointer;
				font-weight: 600;
				transition: 0.3s;
			}

			button:hover {
				opacity: 0.8;
				transform: translateY(-2px);
			}

			.weather-main {
				text-align: center;
			}
			.weather-main img {
				width: 120px;
			}

			.favorites-sidebar {
				border-left: 1px solid var(--glass-border);
				padding-left: 20px;
			}

			.fav-item {
				background: rgba(255, 255, 255, 0.05);
				padding: 15px;
				margin: 10px 0;
				border-radius: 12px;
				cursor: pointer;
				display: flex;
				justify-content: space-between;
				transition: 0.2s;
			}

			.fav-item:hover {
				background: rgba(255, 255, 255, 0.15);
			}

			.chart-box {
				height: 250px;
				margin-top: 20px;
			}

			/* Theme Toggle Styling */
			.theme-switch {
				position: relative;
				display: inline-block;
				width: 50px;
				height: 24px;
			}
			.theme-switch input {
				opacity: 0;
				width: 0;
				height: 0;
			}
			.slider {
				position: absolute;
				cursor: pointer;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background-color: #ccc;
				transition: 0.4s;
				border-radius: 34px;
			}
			.slider:before {
				position: absolute;
				content: '';
				height: 18px;
				width: 18px;
				left: 4px;
				bottom: 3px;
				background-color: white;
				transition: 0.4s;
				border-radius: 50%;
			}
			input:checked + .slider {
				background-color: #2196f3;
			}
			input:checked + .slider:before {
				transform: translateX(24px);
			}

			@media (max-width: 768px) {
				.dashboard {
					grid-template-columns: 1fr;
				}
				.favorites-sidebar {
					border-left: none;
					border-top: 1px solid var(--glass-border);
					padding-top: 20px;
				}
			}
		</style>
	</head>
	<body>
		<script src="./app.js"></script>
	</body>
</html>
